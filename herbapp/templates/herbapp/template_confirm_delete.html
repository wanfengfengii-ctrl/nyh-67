{% extends 'herbapp/base.html' %}

{% block title %}删除确认 - {{ object.template_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">⚠️ 删除确认</h5>
            </div>
            <div class="card-body text-center py-5">
                <p class="lead mb-4">确定要删除标准模板「<strong>{{ object.template_name }}</strong>」吗？</p>
                <p class="text-muted mb-4">
                    适用药材：{{ object.herb_name }}<br>
                    已被 <strong class="text-danger">{{ object.batches.count }}</strong> 个批次引用
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'herbapp:template_detail' object.pk %}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-danger">确认删除</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
