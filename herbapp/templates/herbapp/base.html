{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}传统药材炮制管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ochre: #8B4513;
            --herb-green: #2E8B57;
            --paper: #FAF0E6;
            --ink: #333333;
            --vermilion: #B22222;
            --gold: #B8860B;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, .font-serif {
            font-family: 'Noto Serif SC', serif;
        }
        .navbar {
            background: linear-gradient(135deg, var(--ochre) 0%, #A0522D 100%);
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar-brand {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--paper) !important;
        }
        .navbar .nav-link {
            color: rgba(250,240,230,0.9) !important;
            font-weight: 500;
        }
        .navbar .nav-link:hover {
            color: #fff !important;
        }
        .card {
            border: 1px solid rgba(139,69,19,0.2);
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(139,69,19,0.08);
            background: #fff;
        }
        .card-header {
            background: linear-gradient(135deg, rgba(139,69,19,0.08), rgba(46,139,87,0.08));
            border-bottom: 1px solid rgba(139,69,19,0.15);
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            color: var(--ochre);
        }
        .btn-primary {
            background-color: var(--ochre);
            border-color: var(--ochre);
        }
        .btn-primary:hover {
            background-color: #6B3410;
            border-color: #6B3410;
        }
        .btn-success {
            background-color: var(--herb-green);
            border-color: var(--herb-green);
        }
        .btn-success:hover {
            background-color: #1E6B40;
            border-color: #1E6B40;
        }
        .btn-outline-primary {
            color: var(--ochre);
            border-color: var(--ochre);
        }
        .btn-outline-primary:hover {
            background-color: var(--ochre);
            border-color: var(--ochre);
        }
        .table thead th {
            background-color: rgba(139,69,19,0.08);
            color: var(--ochre);
            font-weight: 600;
            border-bottom: 2px solid rgba(139,69,19,0.2);
        }
        .badge {
            padding: 0.45em 0.8em;
            font-weight: 500;
        }
        .badge-status-pending { background-color: #6c757d; }
        .badge-status-processing { background-color: #0d6efd; }
        .badge-status-completed { background-color: var(--gold); }
        .badge-status-accepted { background-color: var(--herb-green); }
        .badge-color-excellent { background-color: var(--herb-green); }
        .badge-color-good { background-color: #0d6efd; }
        .badge-color-normal { background-color: #6c757d; }
        .badge-color-abnormal { background-color: var(--vermilion); }
        .form-control:focus, .form-select:focus {
            border-color: var(--ochre);
            box-shadow: 0 0 0 0.2rem rgba(139,69,19,0.25);
        }
        .timeline-round {
            position: relative;
            padding-left: 2rem;
            border-left: 2px solid rgba(139,69,19,0.3);
            margin-left: 0.5rem;
        }
        .timeline-round::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 0.25rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--ochre);
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px var(--ochre);
        }
        .chinese-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238B4513' fill-opacity='0.04'%3E%3Cpath d='M30 0l30 30-30 30L0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .stat-card {
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(139,69,19,0.05), rgba(46,139,87,0.05));
        }
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--ochre);
            font-family: 'Noto Serif SC', serif;
        }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: #666;
        }
        .errorlist {
            color: var(--vermilion);
            list-style: none;
            padding: 0;
            margin: 0.25rem 0 0 0;
            font-size: 0.875rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="chinese-pattern">
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'herbapp:batch_list' %}">
                🌿 传统药材炮制管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'herbapp:template_list' %}">标准模板</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'herbapp:batch_list' %}">批次管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'herbapp:batch_create' %}">新建批次</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'herbapp:batch_compare' %}">批次对比</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/" target="_blank">后台管理</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4" style="color: rgba(51,51,51,0.5); font-size: 0.85rem;">
        <div class="container">
            <p class="mb-0 font-serif">传承古法炮制 · 守护药材本真</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
