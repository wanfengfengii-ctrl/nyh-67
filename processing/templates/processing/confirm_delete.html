{% extends 'processing/base.html' %}

{% block page_title %}删除确认{% endblock %}

{% block page_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">⚠️ 删除确认</h5>
            </div>
            <div class="card-body text-center py-5">
                <p class="lead mb-4">确定要删除「<strong>{{ object }}</strong>」吗？</p>
                <p class="text-muted mb-4">此操作将永久删除该数据，且无法恢复。</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="javascript:history.back()" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-danger">确认删除</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
